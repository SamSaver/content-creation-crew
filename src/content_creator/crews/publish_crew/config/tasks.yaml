optimize_metadata:
  description: >
    Create SEO-optimized metadata for the article: {article_title}

    Generate:
    1. Three title options (each under 100 characters):
       - Catchy/clickable version
       - Descriptive/technical version
       - SEO-focused version with keywords

    2. 5-7 relevant tags for Medium (mix of broad and specific)

    3. TL;DR (2-3 sentence summary) for the article preview

    4. Featured image description/prompt for AI image generation

    5. Estimated reading time in minutes
  expected_output: >
    Output EXACTLY this JSON format and nothing else (no extra text before or after):
    {
      "title_options": ["Catchy Title Here", "Descriptive Title Here", "SEO Title Here"],
      "tags": ["Tag1", "Tag2", "Tag3", "Tag4", "Tag5"],
      "tldr": "2-3 sentence compelling summary here",
      "featured_image_prompt": "Description for generating a featured image",
      "reading_time": 8
    }
  agent: seo_optimizer

format_for_medium:
  description: >
    Format the article for Medium publication.

    Current article: {article_content}

    Requirements:
    1. Ensure proper heading hierarchy (# for title, ## for sections, ### for subsections)
    2. Format ALL code blocks with language tags (```python, ```bash, etc.)
    3. Add table of contents after the TL;DR if the article has 5+ sections
    4. Ensure all links are properly formatted as [text](url)
    5. Add "TL;DR" section at the beginning if not present
    6. Add "Further Reading" section at the end if not present
    7. Add metadata as HTML comments at the top: <!-- Tags: ... | Reading Time: ... -->

    Also append at the end:
    - Medium import instructions (how to paste into Medium editor)
    - Pre-publish checklist (tags added, preview image set, subtitle written)

    CRITICAL: Output the COMPLETE formatted article. Your output is saved directly to a file.
  expected_output: >
    The complete formatted article in markdown, ready to copy-paste into Medium.
    Includes the article content, import instructions, and pre-publish checklist.
  agent: formatter

create_linkedin_content:
  description: >
    Create LinkedIn post content to promote the article: {article_title}

    Article Summary: {article_summary}
    Skill Level: {skill_level}
    Category: {category}

    Generate EXACTLY 3 LinkedIn post variations:

    POST 1 - HOOK-FOCUSED:
    - Strong hook in first 2 lines (this is what shows before "see more")
    - Brief key insight from the article
    - Clear call-to-action to read the full article
    - End with 3-5 relevant hashtags

    ---POST 2---

    POST 2 - STORY-FOCUSED:
    - Personal angle: why this topic matters
    - What you learned while researching/writing about it
    - Invitation for others to learn together
    - End with 3-5 relevant hashtags

    ---POST 3---

    POST 3 - QUESTION-FOCUSED:
    - Open with a thought-provoking question related to the topic
    - Brief context from the article
    - Ask readers for their opinions/experiences
    - End with 3-5 relevant hashtags

    Rules for ALL posts:
    - 150-300 words each
    - Include [LINK] placeholder for the Medium article URL
    - Use emojis sparingly for visual appeal
    - Match the {skill_level} audience tone
    - The first 2 lines are CRITICAL - they appear before the "see more" fold
  expected_output: >
    Three complete LinkedIn posts separated by "---POST 2---" and "---POST 3---" markers.
    Each post is ready to copy-paste into LinkedIn.
    After the 3 posts, include posting tips: best time to post and whether to include an image.
  agent: linkedin_creator
