deep_research:
  description: >
    Conduct deep research on the selected topic: {topic_title}
    Topic Summary: {topic_summary}
    Target Skill Level: {skill_level}

    Steps:
    1. Use "Search for specific topic information" tool to find tutorials and articles about {topic_title}
    2. Use "Read web page content" tool to read the full content of the most relevant URLs
    3. Gather comprehensive information including:
       - Core concepts and definitions
       - Key research papers and breakthroughs
       - Real-world applications and use cases
       - Code implementations and examples
       - Common misconceptions to avoid

    Focus on depth appropriate for {skill_level} level while ensuring
    foundational concepts are covered.
  expected_output: >
    A structured research report with these exact sections:

    ## Core Concepts
    [Clear explanations of the main concepts]

    ## Key Papers and Breakthroughs
    [Important research with URLs]

    ## Real-World Applications
    [How this is used in industry]

    ## Code Examples Found
    [Any code snippets or implementations discovered]

    ## Key Terminology
    [Term: Definition format for important terms]
  agent: research_specialist

create_outline:
  description: >
    Create a detailed article outline for: {topic_title}
    Skill Level: {skill_level}

    Structure the article based on skill level:

    BEGINNER Structure:
    - Hook: Relatable real-world analogy
    - What is it? (Simple explanation, no jargon)
    - Why should you care? (Personal/professional benefits)
    - How it works (High-level, intuitive)
    - Getting started (Tools, first steps)
    - Mini-project: Copy-paste runnable example
    - Resources to learn more

    INTERMEDIATE Structure:
    - Hook: Technical problem it solves
    - Concept explanation (with technical depth)
    - Why it matters (Industry applications)
    - Core fundamentals (Key algorithms/mechanisms)
    - Step-by-step implementation guide
    - Mini-project: Extensible code example
    - Common pitfalls and best practices
    - Resources and next steps

    EXPERT Structure:
    - Hook: Cutting-edge research angle
    - Deep technical dive (architecture, mathematics)
    - State-of-the-art performance analysis
    - Implementation details and optimizations
    - Advanced techniques and variants
    - Mini-project: Production-ready implementation
    - Open research questions and opportunities
    - Citations and further reading

    Include 3-5 specific bullet points under each section describing what to cover.
  expected_output: >
    A detailed outline with:
    - Section headers using ## markdown format
    - 3-5 bullet points under each section
    - Estimated word count per section
    - Notes on what code examples to include where
  agent: content_planner
  context:
    - deep_research

write_article:
  description: >
    Write the complete Medium-style article for: {topic_title}
    Skill Level: {skill_level}

    Your article MUST follow this exact structure:

    # [Engaging Title for {topic_title}]

    **TL;DR:** [2-3 sentences summarizing the key takeaway]

    ## [Hook Section - start with a compelling story, question, or scenario. 100-150 words]

    ## What Is {topic_title}?
    [Clear explanation adapted to {skill_level} level. 200-300 words]

    ## Why It Matters
    [Real-world impact and applications. 150-200 words]

    ## How It Works
    [Technical explanation at {skill_level} level with code snippets. 300-400 words]

    ## Getting Started / Implementation
    [Practical step-by-step guide with code. 200-300 words]

    ## Key Takeaways
    [Bulleted list of 3-5 main points]

    ## Further Reading
    [3-5 links to resources with brief descriptions]

    Writing rules:
    - Short paragraphs (2-3 sentences max)
    - Use **bold** for key terms when first introduced
    - Use `code font` for technical terms and commands
    - Use > blockquotes for important insights
    - Include ```python code blocks with comments
    - Total: 1500-2500 words
    - DO NOT start with "In this article" or "Let's dive in"
  expected_output: >
    The COMPLETE article in markdown format, ready to be saved as a file.
    Must include: title, TL;DR, all sections listed above, code examples,
    and proper markdown formatting throughout.
  agent: writer
  context:
    - create_outline

edit_article:
  description: >
    Review and edit the article for: {topic_title}
    Skill Level: {skill_level}

    Check for:
    1. Technical accuracy - verify facts and concepts
    2. Clarity - ensure explanations are clear for {skill_level} readers
    3. Flow - check transitions between sections
    4. Style - conversational Medium tone, short paragraphs
    5. Formatting - proper markdown, code blocks with language tags
    6. Grammar and spelling

    CRITICAL: Your output must be the COMPLETE edited article with all improvements applied.
    Do NOT output just a list of suggestions or review notes.
    Your output IS the final article that will be saved directly to a file.
  expected_output: >
    The COMPLETE polished article in markdown format with all edits applied.
    This output goes directly to a file, so it must be the full article text.
  agent: editor
  context:
    - write_article

create_project:
  description: >
    Create a practical mini-project for: {topic_title}
    Skill Level: {skill_level}

    Size requirements:
    - BEGINNER: Complete working example (~50 lines), copy-paste ready
    - INTERMEDIATE: Extensible template with exercises (~100-150 lines)
    - EXPERT: Full implementation with tests and documentation (~200+ lines)

    Your output MUST include ALL of these sections:

    ## Mini-Project: [Project Name]

    ### Description
    [What this project does and what you'll learn]

    ### Requirements
    ```
    [package1]==x.x.x
    [package2]==x.x.x
    ```

    ### The Code
    ```python
    # [Full, runnable Python code with comments on every significant block]
    ```

    ### How to Run
    [Step-by-step instructions]

    ### Expected Output
    [What the user should see when they run it]

    ### Extension Ideas
    [3-5 ideas for how to extend this project]

    RULES:
    - All code must be copy-paste runnable with ALL imports included
    - Do NOT use placeholder comments like "# your code here"
    - Include error handling for common issues
    - The project must directly relate to the article topic
  expected_output: >
    A complete, self-contained project document with all sections listed above.
    The code must be runnable as-is after installing the listed requirements.
  agent: code_specialist
  context:
    - edit_article
